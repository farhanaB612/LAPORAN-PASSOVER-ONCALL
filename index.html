<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>On-Call Passover Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen antialiased selection:bg-indigo-500/30 selection:text-indigo-200">

    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full max-w-7xl h-64 bg-gradient-to-b from-indigo-500/10 via-transparent to-transparent blur-3xl pointer-events-none"></div>

    <div class="max-w-7xl mx-auto p-4 md:p-8 relative z-10 space-y-8">
        
        <header class="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-6 bg-slate-900/60 backdrop-blur-md border border-slate-800 p-8 rounded-2xl shadow-xl">
            <div class="space-y-2">
                <div class="flex items-center gap-3">
                    <span class="w-3 h-3 rounded-full bg-indigo-500 animate-pulse"></span>
                    <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-white via-slate-200 to-slate-400">
                        Clinical Passover Registry
                    </h1>
                </div>
                <p class="text-slate-300 text-sm md:text-base font-medium max-w-2xl leading-relaxed opacity-90">
                    Welcome to the institutional handovers and shift logs. Use this system to record daily operational continuity between departments and extract reports.
                </p>
                <div class="text-xs text-indigo-400 font-mono tracking-wider uppercase pt-1">
                    System Mode: Running Monthly Continuity Log
                </div>
            </div>
            
            <button onclick="exportToCSV()" class="w-full lg:w-auto bg-indigo-600 hover:bg-indigo-500 active:scale-98 text-white font-semibold text-xs px-6 py-3.5 rounded-xl shadow-lg shadow-indigo-600/15 border border-indigo-400/20 transition-all flex items-center justify-center gap-2 cursor-pointer shrink-0">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                Export Monthly Log (.CSV)
            </button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <section class="bg-slate-900/40 border border-slate-800/80 p-6 rounded-2xl shadow-lg h-fit space-y-6">
                <h2 class="text-sm font-semibold tracking-wider text-slate-400 uppercase border-b border-slate-800 pb-3">New Shift Entry</h2>
                
                <form id="passoverForm" class="space-y-4">
                    <div>
                        <label class="block text-xs font-medium text-slate-400 mb-1.5">Section</label>
                        <select id="section" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm text-slate-200 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 focus:outline-none transition-all cursor-pointer">
                            <option value="A&E --- FPDU">A&E --- FPDU</option>
                            <option value="FPDU --- A&E">FPDU --- A&E</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs font-medium text-slate-400 mb-1.5">Date Time of Passover</label>
                        <input type="datetime-local" required id="dateTime" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm text-slate-200 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 focus:outline-none transition-all">
                    </div>

                    <div>
                        <label class="block text-xs font-medium text-slate-400 mb-1.5">Passover From</label>
                        <input type="text" required id="passoverFrom" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm text-slate-200 placeholder:text-slate-600 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 focus:outline-none transition-all" placeholder="Relieving officer name">
                    </div>

                    <div>
                        <label class="block text-xs font-medium text-slate-400 mb-1.5">Received By
